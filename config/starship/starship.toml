"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
format = """
 \
$nix_shell\
$direnv\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$all"""

[character]
success_symbol = "[ у°„ҫ](bold green)"
error_symbol = "[ уұҺҳ](bold red)"

[cmd_duration]
min_time = 0
style = "#a5a5a5"
format = "[|](bright-black) [у°…җ  $duration]($style) "

[battery]
disabled = true

[directory]
truncate_to_repo = false
read_only = " п‘– "
read_only_style = "yellow"

[nix_shell]
format = "$symbol "
symbol = "[пҢ“ ](cyan) [$name](cyan italic) [|](bright-black)"

[git_branch]
style = "yellow"
symbol = "[у°Ҡў  ](#f54c27)"
format = "[|](bright-black) [$symbol$branch(:$remote_branch)]($style)"

[git_status]
format = "( $all_status$ahead_behind) "

conflicted = " [пҗҷ ](bold red)"
ahead = " [у°іў ](green)"
behind = " [у°ің ](green)"
diverged = " [п‘ҝ ](yellow)"
untracked = " [п‘— ](blue)"
stashed = " [п’Ү ](blue dimmed)"
up_to_date = ""
modified = " [п‘ҷ ](yellow)"
staged = " [п’§ ](green)"
renamed = " [п‘ҡ ](yellow)"
deleted = " [п‘ҳ ](red dimmed)"

[gcloud]
symbol = "[у°Ҡӯ ](cyan)"
format = "[|](bright-black) [$symbol](blue) ([$project](cyan bold) )[$account(@$domain )](blue dimmed)"

[terraform]
disabled = true

[lua]
disabled = true

[nodejs]
symbol = "у°Һҷ  "
style = "yellow"
format = "[|](bright-black) [$symbol($version )]($style)"

[golang]
symbol = "[оҳ§ ](#79d4fd) "
style = "cyan dimmed"
format = "[|](bright-black) [$symbol($version )]($style)"

[rust]
style = "red"
format = "[|](bright-black) [$symbol ($version )]($style)"
symbol = "оһЁ "

[buf]
style = "blue"
format = "[|](bright-black) [$symbol ($version )]($style)"

[package]
style = "208"
symbol = "п’Ү  "
format = "[|](bright-black) [$symbol($version )]($style)"

[kubernetes]
disabled = false
symbol = "уұғҫ  "
style = "cyan"
format = "[|](bright-black) [$symbol$context ]($style)"

[[kubernetes.contexts]]
context_pattern = "gke_.*_(?P<var_cluster>[\\w-]+)"
context_alias = "gke-$var_cluster"

[[kubernetes.contexts]]
context_pattern = "arn:aws:eks:(?P<var_region>[\\w-]+):(?P<var_account>[\\w-]+):cluster/(?P<var_cluster>[\\w-]+)"
context_alias = "eks:$var_cluster"

[c]
format = "[|](bright-black) [$symbol($version(-$name) )]($style)"
style = "149"

[cmake]
format = "[|](bright-black) [$symbol($version )]($style)"

[aws]
disabled = true
symbol = "пү°  "
style = "yellow"
format = "[|](bright-black) [$symbol](yellow)[($profile )($region )(\\[$duration\\] )]($style)"

[python]
format = "[|](bright-black) [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol = "оңј "

[zig]
format = "[|](bright-black) [$symbol($version )]($style)"
symbol = "оҡ© "

[vagrant]
symbol = "о©ә  "
format = "[|](bright-black) [$symbol($version )]($style)"

[bun]
symbol = "п’ў  "
format = "[|](bright-black) [$symbol($version )]($style)"

[elixir]
format = "[|](bright-black) [$symbol($version \\(OTP $otp_version\\) )]($style)"

[swift]
format = "[|](bright-black) [$symbol($version )]($style)"

[direnv]
disabled = false
format = "[$loaded](green)[$allowed](#f78c6c) "
unloaded_msg = ""
allowed_msg = ""
# Alternative icons:
# пҒ»  о»Ү  о»Ҷ
loaded_msg = "уұҘҫ "
not_allowed_msg = "уұ§Ҡ "
denied_msg = "у°үҳ "

[username]
format = "[$user]($style)[@](bright-black)"

[hostname]
format = "[$hostname]($style) "

[deno]
format = "[|](bright-black) [$symbol ($version )]($style)"
symbol = "оҹҖ "
